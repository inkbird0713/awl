<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWL 570 Revision Master</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --text: #1e293b;
            --gray-light: #e2e8f0;
        }

        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; background: white; border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        .header { text-align: center; margin-bottom: 25px; }
        .gauge-container { background: var(--gray-light); height: 12px; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        #total-gauge { height: 100%; background: linear-gradient(90deg, #6366f1, #a855f7); width: 0%; transition: 1s ease; }

        .day-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 20px; max-height: 450px; overflow-y: auto; padding: 10px; border: 1px solid #f1f5f9; border-radius: 12px; }
        
        .day-circle { 
            aspect-ratio: 1; border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 0.75rem; font-weight: bold; cursor: pointer; transition: 0.3s; border: 2px solid transparent;
        }
        .day-circle:hover { transform: scale(1.1); border-color: var(--primary); }

        .lv-0 { background: #e2e8f0; color: #94a3b8; }
        .lv-1 { background: #dbeafe; color: #3b82f6; }
        .lv-2 { background: #93c5fd; color: #1e40af; }
        .lv-3 { background: #60a5fa; color: white; }
        .lv-4 { background: #3b82f6; color: white; }
        .lv-5 { background: #1d4ed8; color: white; box-shadow: 0 0 8px rgba(29, 78, 216, 0.3); }

        .hidden { display: none !important; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .word-box { min-height: 150px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .word-display { font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; }
        .word-hidden { color: #cbd5e1; font-style: italic; border-bottom: 2px dashed #cbd5e1; }
        
        .options-grid { display: grid; gap: 10px; }
        .btn { padding: 14px; border: 2px solid var(--gray-light); border-radius: 12px; background: white; cursor: pointer; font-size: 1rem; font-weight: 600; transition: 0.2s; }
        .btn:hover { border-color: var(--primary); color: var(--primary); background: #f8fafc; }
        
        input[type="text"] { width: 100%; padding: 15px; font-size: 1.1rem; border: 2px solid var(--gray-light); border-radius: 12px; text-align: center; outline: none; box-sizing: border-box; }
        
        .back-btn { background: none; border: none; color: #64748b; cursor: pointer; font-size: 0.9rem; }
        #feedback { text-align:center; margin-top:20px; font-weight:bold; min-height:24px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <div id="main-dashboard">
        <div class="header">
            <h2 style="margin:0">AWL 570 Master</h2>
            <div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-top:15px;">
                <span>전체 복습 성공 게이지</span>
                <span id="gauge-percent">0%</span>
            </div>
            <div class="gauge-container"><div id="total-gauge"></div></div>
        </div>
        <div class="day-grid" id="day-grid"></div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="quiz-header">
            <button class="back-btn" onclick="goHome()">← 목록으로</button>
            <span id="current-day-title" style="font-weight: bold;">Day 1</span>
            <span id="quiz-progress" style="font-size: 0.8rem; color: #64748b;">1/10</span>
        </div>
        <div class="progress-container" style="height:4px; background:#eee; margin-bottom:20px;">
            <div id="step-fill" style="height:100%; background:var(--primary); width:0%; transition: 0.3s;"></div>
        </div>

        <div id="step-tag" style="font-size:0.75rem; color:var(--primary); font-weight:800; margin-bottom:10px; text-transform: uppercase;"></div>
        <div class="word-box">
            <div id="display-area" class="word-display"></div>
            <div id="hint-area" style="color:#64748b; font-size:0.9rem;"></div>
        </div>

        <div id="mode-pos" class="options-grid hidden">
            <button class="btn" onclick="checkPos('noun')">명사 (Noun)</button>
            <button class="btn" onclick="checkPos('verb')">동사 (Verb)</button>
            <button class="btn" onclick="checkPos('adj')">형용사 (Adjective)</button>
            <button class="btn" onclick="checkPos('adv')">부사 (Adverb)</button>
        </div>

        <div id="mode-spell" class="hidden">
            <input type="text" id="spell-input" placeholder="영단어를 입력하세요" autocomplete="off">
            <button class="btn" style="width:100%; margin-top:10px; background:var(--primary); color:white; border:none;" onclick="checkSpell()">확인</button>
        </div>

        <div id="mode-mean" class="options-grid hidden">
            <div id="mean-options" class="options-grid"></div>
        </div>
        <div id="feedback"></div>
    </div>
</div>

    function renderDashboard() {
        const grid = document.getElementById('day-grid');
        grid.innerHTML = '';
        let completedDaysCount = 0;
        stats.forEach((count, i) => {
            const circle = document.createElement('div');
            circle.className = `day-circle lv-${Math.min(count, 5)}`;
            circle.innerText = i + 1;
            circle.onclick = () => startDay(i);
            grid.appendChild(circle);
            if(count > 0) completedDaysCount++;
        });
        const progress = (completedDaysCount / days.length) * 100;
        document.getElementById('total-gauge').style.width = progress + '%';
        document.getElementById('gauge-percent').innerText = Math.floor(progress) + '%';

            displayArea.innerText = wordData.word;
            displayArea.classList.remove('word-hidden');
            hintArea.innerText = "단어의 품사를 선택하세요";
            document.getElementById('mode-pos').classList.remove('hidden');
        } else if (currentStep === 2) {
            stepTag.innerText = "STEP 2: SPELLING (철자)";
            displayArea.innerText = "???";
            displayArea.classList.add('word-hidden');
            hintArea.innerText = `뜻: ${wordData.mean}`;
            document.getElementById('mode-spell').classList.remove('hidden');
            const input = document.getElementById('spell-input');
            input.value = '';
            setTimeout(() => input.focus(), 50);
        } else if (currentStep === 3) {
            stepTag.innerText = "STEP 3: MEANING (의미)";
            displayArea.innerText = wordData.word;
            displayArea.classList.remove('word-hidden');
            hintArea.innerText = "정확한 한국어 뜻을 고르세요";
            document.getElementById('mode-mean').classList.remove('hidden');
            renderMeanOptions(wordData);
        }
    }

    function renderMeanOptions(correctData) {
        const container = document.getElementById('mean-options');
        container.innerHTML = '';
        
        let decoys = [];
        while(decoys.length < 2) {
            let randomMean = allMeanings[Math.floor(Math.random() * allMeanings.length)];
            if(randomMean !== correctData.mean && !decoys.includes(randomMean)) {
                decoys.push(randomMean);
            }
        }

        const options = [correctData.mean, ...decoys].sort(() => Math.random() - 0.5);
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = opt;
            btn.onclick = () => {
                if(opt === correctData.mean) nextStep();
                else showFeedback("오답입니다!", false);
            };
            container.appendChild(btn);
        });
    }

    function checkPos(p) {
        if(p === days[currentDayIdx][currentWordIdx].pos) nextStep();
        else showFeedback("품사가 다릅니다!", false);
    }

    function checkSpell() {
        const val = document.getElementById('spell-input').value.toLowerCase().trim();
        if(val === days[currentDayIdx][currentWordIdx].word.toLowerCase()) nextStep();
        else showFeedback("철자가 틀렸습니다!", false);
    }

    function nextStep() {
        showFeedback("정답입니다!", true);
        setTimeout(() => {
            currentStep++;
            if(currentStep > 3) { currentStep = 1; currentWordIdx++; }
            if(currentWordIdx < 10) loadQuiz();
            else finishDay();
        }, 600);
    }

    function showFeedback(msg, isCorrect) {
        const f = document.getElementById('feedback');
        f.innerText = msg;
        f.style.color = isCorrect ? "#22c55e" : "#ef4444";
    }

    function finishDay() {
        stats[currentDayIdx]++; 
        alert(`Day ${currentDayIdx + 1} 완료!`);
        goHome();
    }

    function goHome() {
        document.getElementById('main-dashboard').classList.remove('hidden');
        document.getElementById('quiz-screen').classList.add('hidden');
        renderDashboard();
    }

    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && currentStep === 2) checkSpell();
    });

    renderDashboard();
</script>
</body>
</html>
